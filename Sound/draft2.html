<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground — Draft 2</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100vh;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      padding: 44px 64px 52px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-shrink: 0;
    }

    .title {
      font-size: clamp(56px, 9vw, 138px);
      font-weight: 900;
      letter-spacing: -0.035em;
      line-height: 0.92;
      color: #000;
      user-select: none;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 28px;
      padding-top: 10px;
    }

    .ctrl {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      color: #000;
      letter-spacing: -0.01em;
      white-space: nowrap;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    .ctrl:hover { opacity: 0.45; }
    #btn-bpm { cursor: ew-resize; }

    .grid-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      padding-top: 8px;
    }

    .grid {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 0.9vw, 12px);
    }

    .row-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .track-label {
      width: 62px;
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #000;
      text-align: right;
      user-select: none;
      opacity: 0.45;
    }

    .label-spacer {
      width: 62px;
      flex-shrink: 0;
    }

    .row {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      gap: clamp(6px, 0.85vw, 12px);
    }

    .dot {
      aspect-ratio: 1;
      border-radius: 50%;
      background: #000;
      cursor: pointer;
      transition: transform 0.07s ease;
      will-change: transform;
    }

    .dot:hover:not(.active) {
      background: #1c1c1c;
      transform: scale(1.04);
    }

    .dot.active:hover {
      transform: scale(1.04);
      filter: brightness(1.12);
    }

    .dot.beat {
      transform: scale(1.1);
      filter: brightness(1.18);
      transition: transform 0.04s ease, filter 0.04s ease;
    }

    .dot.col-active:not(.active) {
      background: #111;
    }

    .playhead-wrap {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      gap: clamp(6px, 0.85vw, 12px);
      margin-bottom: 6px;
      flex-shrink: 0;
    }

    .playhead-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .ph-cell {
      height: 3px;
      border-radius: 2px;
      background: transparent;
      transition: background 0.06s ease;
    }

    .ph-cell.active { background: #000; }
  </style>
</head>

<body>
  <header>
    <h1 class="title">Playground</h1>
    <nav class="controls">
      <button class="ctrl" id="btn-sound">Sound • On</button>
      <button class="ctrl" id="btn-bpm">BPM • 112</button>
      <button class="ctrl" id="btn-play">Play</button>
      <button class="ctrl" id="btn-randomise">Randomise</button>
      <button class="ctrl" id="btn-clear">Clear</button>
    </nav>
  </header>

  <div class="grid-wrap">
    <div style="width:100%">
      <div class="playhead-row">
        <div class="label-spacer"></div>
        <div class="playhead-wrap" id="playhead"></div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

<script>
// ─── TRACKS ─────────────────────────────────────────────────────────────────

const STEPS = 16;

const TRACKS = [
  {
    id: 'kick',    label: 'Kick',
    gradient: 'radial-gradient(circle at 50% 50%, #FF3080 0%, #FF0055 22%, #CC0044 48%, #330011 76%, #000 100%)',
    steps: [true,false,false,false, false,false,false,false, true,false,false,false, false,false,false,false],
  },
  {
    id: 'snare',   label: 'Snare',
    gradient: 'radial-gradient(circle at 50% 50%, #DDFF00 0%, #AAFF00 22%, #66CC00 50%, #182200 78%, #000 100%)',
    steps: [false,false,false,false, true,false,false,false, false,false,false,false, true,false,false,false],
  },
  {
    id: 'clap',    label: 'Clap',
    gradient: 'radial-gradient(circle at 50% 50%, #5599FF 0%, #3366FF 22%, #1144DD 50%, #001130 78%, #000 100%)',
    steps: [false,false,false,false, true,false,false,false, false,false,false,false, true,false,false,false],
  },
  {
    id: 'hh_closed', label: 'HH Cl',
    gradient: 'radial-gradient(circle at 50% 50%, #FF9944 0%, #FF6622 22%, #CC3300 50%, #221000 78%, #000 100%)',
    steps: [true,false,true,false, true,false,true,false, true,false,true,false, true,false,true,false],
  },
  {
    id: 'hh_open', label: 'HH Op',
    gradient: 'radial-gradient(circle at 50% 50%, #FF44BB 0%, #FF22AA 22%, #CC0088 50%, #220018 78%, #000 100%)',
    steps: [false,false,false,false, false,false,true,false, false,false,false,false, false,false,true,false],
  },
  {
    id: 'bass',    label: 'Bass',
    gradient: 'radial-gradient(circle at 50% 50%, #00FFCC 0%, #00DDAA 22%, #009966 50%, #001A12 78%, #000 100%)',
    steps: [true,false,false,true, false,false,true,false, false,false,true,false, false,true,false,false],
  },
  {
    id: 'synth',   label: 'Synth',
    gradient: 'radial-gradient(circle at 50% 50%, #CC88FF 0%, #9944EE 22%, #6611BB 50%, #150030 78%, #000 100%)',
    steps: [true,false,false,false, false,false,true,false, false,true,false,false, false,false,true,false],
  },
  {
    id: 'pad',     label: 'Pad',
    gradient: 'radial-gradient(circle at 50% 50%, #FFDDAA 0%, #FFBB66 22%, #CC7722 50%, #1A1000 78%, #000 100%)',
    steps: [true,false,false,false, false,false,false,false, false,false,false,false, true,false,false,false],
  },
];

// ─── STATE ──────────────────────────────────────────────────────────────────

let bpm = 112;
let isPlaying = false;
let soundEnabled = true;
let currentStep = 0;
let schedulerHandle = null;
let nextNoteTime = 0;
let audioCtx = null;
let openHHNode = null;

// Shared FX nodes (lazy init)
let masterGainNode = null;
let reverbNode = null;
let reverbWetGain = null;
let hallReverbNode = null;
let hallWetGain = null;
let delayNode = null;
let delayFeedback = null;

// ─── AUDIO CONTEXT ──────────────────────────────────────────────────────────

function ac() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function mg() {
  if (!masterGainNode) {
    masterGainNode = ac().createGain();
    masterGainNode.connect(ac().destination);
  }
  return masterGainNode;
}

// ─── NOISE BUFFER ───────────────────────────────────────────────────────────

let noiseBuffer = null;
function noise() {
  if (noiseBuffer) return noiseBuffer;
  const ctx = ac();
  const len = ctx.sampleRate * 2;
  noiseBuffer = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = noiseBuffer.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return noiseBuffer;
}

// ─── REVERB: generates a stereo IR for convolution ──────────────────────────

function buildReverb(seconds, decay, preDelay = 0.01) {
  const ctx = ac();
  const conv = ctx.createConvolver();
  const rate = ctx.sampleRate;
  const len = Math.floor(rate * seconds);
  const buf = ctx.createBuffer(2, len, rate);

  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    const preSamples = Math.floor(rate * preDelay);
    for (let i = 0; i < len; i++) {
      if (i < preSamples) { d[i] = 0; continue; }
      const t = (i - preSamples) / (len - preSamples);
      // Exponential decay + slight early reflection modulation
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decay);
      // Add a few early reflections for realism
      if (i < preSamples + rate * 0.04) d[i] *= 1.5;
    }
  }

  conv.buffer = buf;
  return conv;
}

// ─── SHARED EFFECTS INIT ─────────────────────────────────────────────────────

function initFX() {
  if (reverbNode) return;
  const ctx = ac();

  // Room reverb (for drums) — 1.2s, medium decay
  reverbNode = buildReverb(1.2, 2.8, 0.008);
  reverbWetGain = ctx.createGain();
  reverbWetGain.gain.value = 0.22;
  reverbNode.connect(reverbWetGain);
  reverbWetGain.connect(mg());

  // Hall reverb (for synth/pad) — 3.2s, slow decay, more pre-delay
  hallReverbNode = buildReverb(3.2, 1.8, 0.025);
  hallWetGain = ctx.createGain();
  hallWetGain.gain.value = 0.55;
  hallReverbNode.connect(hallWetGain);
  hallWetGain.connect(mg());

  // Echo/delay for synth — dotted 1/8 feel
  delayNode = ctx.createDelay(1.5);
  delayNode.delayTime.value = (60 / bpm) * 0.75; // dotted 1/8

  delayFeedback = ctx.createGain();
  delayFeedback.gain.value = 0.38;

  // Delay feedback loop with tone shaping
  const delayLP = ctx.createBiquadFilter();
  delayLP.type = 'lowpass';
  delayLP.frequency.value = 3200;

  delayNode.connect(delayLP);
  delayLP.connect(delayFeedback);
  delayFeedback.connect(delayNode);

  // Delay taps into hall reverb for long tail
  const delayToReverb = ctx.createGain();
  delayToReverb.gain.value = 0.3;
  delayNode.connect(delayToReverb);
  delayToReverb.connect(hallReverbNode);

  // Delay also reaches master at reduced level
  const delayMaster = ctx.createGain();
  delayMaster.gain.value = 0.45;
  delayNode.connect(delayMaster);
  delayMaster.connect(mg());
}

function updateDelayTime() {
  if (delayNode) {
    delayNode.delayTime.value = (60 / bpm) * 0.75;
  }
}

// ─── INSTRUMENTS ─────────────────────────────────────────────────────────────

function playKick(t) {
  const ctx = ac();
  const g = ctx.createGain();
  g.gain.setValueAtTime(1.1, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.48);
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(170, t);
  osc.frequency.exponentialRampToValueAtTime(38, t + 0.38);
  osc.connect(g); g.connect(mg());
  osc.start(t); osc.stop(t + 0.52);

  // click
  const cg = ctx.createGain();
  cg.gain.setValueAtTime(0.65, t);
  cg.gain.exponentialRampToValueAtTime(0.001, t + 0.022);
  const co = ctx.createOscillator();
  co.type = 'sine';
  co.frequency.setValueAtTime(900, t);
  co.frequency.exponentialRampToValueAtTime(80, t + 0.018);
  co.connect(cg); cg.connect(mg());
  co.start(t); co.stop(t + 0.03);
}

function playSnare(t) {
  initFX();
  const ctx = ac();

  const ns = ctx.createBufferSource();
  ns.buffer = noise();
  const nf = ctx.createBiquadFilter();
  nf.type = 'bandpass'; nf.frequency.value = 3200; nf.Q.value = 0.6;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.9, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.19);
  ns.connect(nf); nf.connect(ng);
  ng.connect(mg());
  // Snare room send
  const rs = ctx.createGain(); rs.gain.value = 0.18;
  ng.connect(rs); rs.connect(reverbNode);
  ns.start(t); ns.stop(t + 0.22);

  const osc = ctx.createOscillator();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(200, t);
  osc.frequency.exponentialRampToValueAtTime(100, t + 0.09);
  const og = ctx.createGain();
  og.gain.setValueAtTime(0.6, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  osc.connect(og); og.connect(mg());
  osc.start(t); osc.stop(t + 0.14);
}

function playClap(t) {
  initFX();
  const ctx = ac();

  [0, 0.008, 0.018, 0.03].forEach((dt, i) => {
    const ns = ctx.createBufferSource();
    ns.buffer = noise();
    const f = ctx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 1300 + i * 300; f.Q.value = 0.8;
    const g = ctx.createGain();
    const vel = i === 3 ? 0.82 : 0.35;
    g.gain.setValueAtTime(vel, t + dt);
    g.gain.exponentialRampToValueAtTime(0.001, t + dt + (i === 3 ? 0.13 : 0.04));
    ns.connect(f); f.connect(g);
    g.connect(mg());
    // Clap room send
    const rs = ctx.createGain(); rs.gain.value = 0.25;
    g.connect(rs); rs.connect(reverbNode);
    ns.start(t + dt); ns.stop(t + dt + 0.18);
  });
}

function playHHClosed(t) {
  const ctx = ac();
  if (openHHNode) {
    try { openHHNode.gain.setValueAtTime(0, t); } catch(e) {}
  }
  const ns = ctx.createBufferSource();
  ns.buffer = noise();
  const f = ctx.createBiquadFilter();
  f.type = 'highpass'; f.frequency.value = 7500;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.72, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.046);
  ns.connect(f); f.connect(g); g.connect(mg());
  ns.start(t); ns.stop(t + 0.06);
}

function playHHOpen(t) {
  const ctx = ac();
  const ns = ctx.createBufferSource();
  ns.buffer = noise();
  const f = ctx.createBiquadFilter();
  f.type = 'highpass'; f.frequency.value = 5200;
  const f2 = ctx.createBiquadFilter();
  f2.type = 'peaking'; f2.frequency.value = 9000; f2.gain.value = 6;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.58, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
  openHHNode = g;
  ns.connect(f); f.connect(f2); f2.connect(g); g.connect(mg());
  ns.start(t); ns.stop(t + 0.38);
}

// Bass: sawtooth with sub, no reverb
const BASS_NOTES = [55, 73.42, 82.41, 55, 65.41, 87.31, 110, 55];
let bassIdx = 0;

function playBass(t) {
  const ctx = ac();
  const freq = BASS_NOTES[bassIdx++ % BASS_NOTES.length];

  const osc = ctx.createOscillator();
  osc.type = 'sawtooth'; osc.frequency.value = freq;

  const sub = ctx.createOscillator();
  sub.type = 'sine'; sub.frequency.value = freq;

  const filt = ctx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.setValueAtTime(1600, t);
  filt.frequency.exponentialRampToValueAtTime(300, t + 0.25);
  filt.Q.value = 6;

  const g = ctx.createGain();
  g.gain.setValueAtTime(0.5, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.36);

  const sg = ctx.createGain(); sg.gain.value = 0.35;
  osc.connect(filt); sub.connect(sg); sg.connect(filt);
  filt.connect(g); g.connect(mg());
  osc.start(t); sub.start(t); osc.stop(t + 0.4); sub.stop(t + 0.4);
}

// ─── TRIANGLE SYNTH — routed through echo + hall reverb ──────────────────────

// Pentatonic minor in A — steps cycle through notes based on step index
const SYNTH_NOTES = [
  220,   // A3
  261.63,// C4
  293.66,// D4
  329.63,// E4
  392,   // G4
  440,   // A4
  523.25,// C5
  391.00,// G4
];
let synthIdx = 0;

function playSynth(t, step) {
  initFX();
  const ctx = ac();
  // Map step position → note for a melodic arc
  const noteMap = [0, 2, 4, 3, 5, 3, 6, 4, 1, 5, 2, 6, 3, 4, 2, 0];
  const freq = SYNTH_NOTES[noteMap[step] % SYNTH_NOTES.length];

  // Dual triangle oscillators for richness
  const osc1 = ctx.createOscillator();
  osc1.type = 'triangle';
  osc1.frequency.value = freq;

  const osc2 = ctx.createOscillator();
  osc2.type = 'triangle';
  osc2.frequency.value = freq * 2.003; // octave up, slightly detuned

  const osc3 = ctx.createOscillator();
  osc3.type = 'sine';
  osc3.frequency.value = freq * 0.998; // sub, tiny detune

  // Resonant lowpass with sweep
  const filt = ctx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.setValueAtTime(4500, t);
  filt.frequency.exponentialRampToValueAtTime(900, t + 0.5);
  filt.Q.value = 5;

  // Amplitude envelope — long enough for reverb to breathe
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.001, t);
  g.gain.linearRampToValueAtTime(0.52, t + 0.012); // fast attack
  g.gain.setValueAtTime(0.52, t + 0.018);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.7); // medium decay

  // Mix oscillators
  const mixGain = ctx.createGain(); mixGain.gain.value = 1;
  const osc2g = ctx.createGain(); osc2g.gain.value = 0.4;
  const osc3g = ctx.createGain(); osc3g.gain.value = 0.3;

  osc1.connect(mixGain);
  osc2.connect(osc2g); osc2g.connect(mixGain);
  osc3.connect(osc3g); osc3g.connect(mixGain);
  mixGain.connect(filt);
  filt.connect(g);

  // Dry signal (quiet — reverb carries it)
  const dry = ctx.createGain(); dry.gain.value = 0.18;
  g.connect(dry); dry.connect(mg());

  // Echo send
  const echoSend = ctx.createGain(); echoSend.gain.value = 0.72;
  g.connect(echoSend); echoSend.connect(delayNode);

  // Direct hall reverb send (pre-delay character)
  const revSend = ctx.createGain(); revSend.gain.value = 0.5;
  g.connect(revSend); revSend.connect(hallReverbNode);

  osc1.start(t); osc2.start(t); osc3.start(t);
  osc1.stop(t + 0.85); osc2.stop(t + 0.85); osc3.stop(t + 0.85);
}

// ─── PAD — slow triangle chord, drenched in reverb ──────────────────────────

const PAD_CHORDS = [
  [220, 261.63, 329.63],   // Am
  [196, 246.94, 293.66],   // Gm
  [174.61, 220, 261.63],   // Fm
  [246.94, 293.66, 369.99],// Bm
];
let padChordIdx = 0;

function playPad(t) {
  initFX();
  const ctx = ac();
  const chord = PAD_CHORDS[padChordIdx++ % PAD_CHORDS.length];

  chord.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = freq;

    // Slight pitch shimmer
    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.3 + i * 0.11;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 0.5;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);

    const g = ctx.createGain();
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(0.28 - i * 0.04, t + 0.08); // slow attack
    g.gain.setValueAtTime(0.28 - i * 0.04, t + 0.3);
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.8);

    osc.connect(g);
    lfo.start(t); osc.start(t);

    // Almost fully wet — go directly to hall reverb
    const dryG = ctx.createGain(); dryG.gain.value = 0.06;
    const revG = ctx.createGain(); revG.gain.value = 0.9;
    g.connect(dryG); dryG.connect(mg());
    g.connect(revG); revG.connect(hallReverbNode);

    osc.stop(t + 2.0); lfo.stop(t + 2.0);
  });
}

// ─── DISPATCHER ──────────────────────────────────────────────────────────────

function playSound(id, t, step = 0) {
  if (!soundEnabled) return;
  const time = t ?? ac().currentTime + 0.01;
  switch (id) {
    case 'kick':      playKick(time);          break;
    case 'snare':     playSnare(time);         break;
    case 'clap':      playClap(time);          break;
    case 'hh_closed': playHHClosed(time);      break;
    case 'hh_open':   playHHOpen(time);        break;
    case 'bass':      playBass(time);          break;
    case 'synth':     playSynth(time, step);   break;
    case 'pad':       playPad(time);           break;
  }
}

// ─── SEQUENCER ───────────────────────────────────────────────────────────────

const LOOKAHEAD_MS = 25;
const SCHEDULE_AHEAD = 0.08;

function scheduleAhead() {
  const ctx = ac();
  while (nextNoteTime < ctx.currentTime + SCHEDULE_AHEAD) {
    const step = currentStep;
    TRACKS.forEach(tr => {
      if (tr.steps[step]) playSound(tr.id, nextNoteTime, step);
    });
    const delay = Math.max(0, (nextNoteTime - ctx.currentTime) * 1000);
    setTimeout(() => advanceVisual(step), delay);
    nextNoteTime += (60 / bpm) / 4;
    currentStep = (currentStep + 1) % STEPS;
  }
  schedulerHandle = setTimeout(scheduleAhead, LOOKAHEAD_MS);
}

function startSequencer() {
  if (isPlaying) return;
  isPlaying = true;
  currentStep = 0;
  nextNoteTime = ac().currentTime + 0.04;
  scheduleAhead();
  document.getElementById('btn-play').textContent = 'Stop';
}

function stopSequencer() {
  if (!isPlaying) return;
  isPlaying = false;
  clearTimeout(schedulerHandle);
  document.getElementById('btn-play').textContent = 'Play';
  clearPlayhead();
}

// ─── VISUAL ───────────────────────────────────────────────────────────────────

let lastStep = -1;

function advanceVisual(step) {
  if (lastStep >= 0) {
    document.querySelectorAll(`.dot[data-step="${lastStep}"]`).forEach(d => {
      d.classList.remove('beat', 'col-active');
    });
    const prev = document.getElementById(`ph-${lastStep}`);
    if (prev) prev.classList.remove('active');
  }

  document.querySelectorAll(`.dot[data-step="${step}"]`).forEach(d => {
    d.classList.add('col-active');
    if (d.classList.contains('active')) {
      d.classList.add('beat');
      setTimeout(() => d.classList.remove('beat'), 90);
    }
  });

  const ph = document.getElementById(`ph-${step}`);
  if (ph) ph.classList.add('active');

  lastStep = step;
}

function clearPlayhead() {
  if (lastStep >= 0) {
    document.querySelectorAll(`.dot[data-step="${lastStep}"]`).forEach(d => {
      d.classList.remove('beat', 'col-active');
    });
    const ph = document.getElementById(`ph-${lastStep}`);
    if (ph) ph.classList.remove('active');
    lastStep = -1;
  }
}

// ─── BUILD UI ────────────────────────────────────────────────────────────────

function buildPlayhead() {
  const wrap = document.getElementById('playhead');
  wrap.innerHTML = '';
  for (let s = 0; s < STEPS; s++) {
    const c = document.createElement('div');
    c.className = 'ph-cell';
    c.id = `ph-${s}`;
    wrap.appendChild(c);
  }
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  TRACKS.forEach((track, ti) => {
    const wrap = document.createElement('div');
    wrap.className = 'row-wrap';

    const label = document.createElement('div');
    label.className = 'track-label';
    label.textContent = track.label;
    wrap.appendChild(label);

    const row = document.createElement('div');
    row.className = 'row';
    track.steps.forEach((on, si) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (on ? ' active' : '');
      dot.dataset.track = ti;
      dot.dataset.step = si;
      if (on) dot.style.background = track.gradient;
      dot.addEventListener('click', () => {
        track.steps[si] = !track.steps[si];
        const isOn = track.steps[si];
        dot.classList.toggle('active', isOn);
        dot.style.background = isOn ? track.gradient : '';
        if (isOn && soundEnabled) {
          ac();
          playSound(track.id, null, si);
        }
      });
      row.appendChild(dot);
    });

    wrap.appendChild(row);
    grid.appendChild(wrap);
  });
}

// ─── CONTROLS ────────────────────────────────────────────────────────────────

document.getElementById('btn-play').addEventListener('click', () => {
  if (isPlaying) stopSequencer(); else startSequencer();
});

document.getElementById('btn-sound').addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  document.getElementById('btn-sound').textContent = `Sound • ${soundEnabled ? 'On' : 'Off'}`;
  if (soundEnabled) ac();
});

document.getElementById('btn-clear').addEventListener('click', () => {
  TRACKS.forEach(t => t.steps.fill(false));
  bassIdx = 0; synthIdx = 0; padChordIdx = 0;
  buildGrid();
});

// Musically weighted randomiser — each track has per-step probabilities
document.getElementById('btn-randomise').addEventListener('click', () => {
  const prob = {
    // [beat strength per 16 steps] — higher = more likely to fire
    kick:      [0.85, 0.05, 0.10, 0.05, 0.10, 0.05, 0.15, 0.05, 0.75, 0.05, 0.10, 0.10, 0.10, 0.05, 0.20, 0.05],
    snare:     [0.05, 0.05, 0.05, 0.05, 0.80, 0.05, 0.10, 0.10, 0.05, 0.05, 0.10, 0.05, 0.80, 0.05, 0.10, 0.15],
    clap:      [0.05, 0.05, 0.05, 0.05, 0.55, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.55, 0.05, 0.05, 0.05],
    hh_closed: [0.80, 0.15, 0.75, 0.15, 0.75, 0.20, 0.70, 0.25, 0.75, 0.15, 0.70, 0.20, 0.75, 0.15, 0.65, 0.30],
    hh_open:   [0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.35, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.35, 0.05],
    bass:      [0.80, 0.05, 0.15, 0.35, 0.05, 0.25, 0.40, 0.05, 0.20, 0.35, 0.15, 0.05, 0.30, 0.20, 0.15, 0.10],
    synth:     [0.40, 0.05, 0.10, 0.05, 0.15, 0.05, 0.35, 0.05, 0.10, 0.30, 0.05, 0.15, 0.05, 0.10, 0.30, 0.05],
    pad:       [0.55, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.10, 0.05, 0.05, 0.05, 0.35, 0.05, 0.05, 0.05],
  };

  TRACKS.forEach(t => {
    const p = prob[t.id];
    t.steps = t.steps.map((_, i) => Math.random() < p[i]);
  });

  bassIdx = 0; synthIdx = 0; padChordIdx = 0;
  buildGrid();
});

let bpmDrag = null;
const bpmBtn = document.getElementById('btn-bpm');

bpmBtn.addEventListener('mousedown', e => {
  bpmDrag = { startX: e.clientX, startBpm: bpm };
  e.preventDefault();
});

window.addEventListener('mousemove', e => {
  if (!bpmDrag) return;
  const delta = Math.round((e.clientX - bpmDrag.startX) / 3);
  bpm = Math.min(220, Math.max(50, bpmDrag.startBpm + delta));
  bpmBtn.textContent = `BPM • ${bpm}`;
  updateDelayTime();
});

window.addEventListener('mouseup', () => { bpmDrag = null; });

bpmBtn.addEventListener('dblclick', () => {
  const v = prompt('BPM (50–220):', bpm);
  if (v !== null && !isNaN(v)) {
    bpm = Math.min(220, Math.max(50, Math.round(+v)));
    bpmBtn.textContent = `BPM • ${bpm}`;
    updateDelayTime();
  }
});

window.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    if (isPlaying) stopSequencer(); else startSequencer();
  }
});

// ─── INIT ────────────────────────────────────────────────────────────────────

buildPlayhead();
buildGrid();
</script>
</body>
</html>
