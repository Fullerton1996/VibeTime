<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coffee</title>
<style>
  * { margin:0; padding:0; }
  body { background:#060201; overflow:hidden; }
  #hint {
    position:fixed; bottom:28px; width:100%; text-align:center;
    color:rgba(150,90,40,.45); font:11px/1 Georgia,serif;
    letter-spacing:5px; text-transform:uppercase; pointer-events:none;
    transition:opacity 1.2s;
  }
  #hint.gone { opacity:0; }
</style>
</head>
<body>
<div id="hint">hover to pour</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060201);
scene.fog = new THREE.Fog(0x060201, 9, 22);

const cam = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, .1, 50);
cam.position.set(0, 1.1, 7.5);
cam.lookAt(0, .1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

// ── Lights ──────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x2a1205, 2.2));

const spot = new THREE.SpotLight(0xffa050, 4.5, 28, .5, .65, 1.5);
spot.position.set(3, 9, 5);
spot.castShadow = true;
spot.shadow.bias = -0.001;
spot.shadow.mapSize.set(1024, 1024);
scene.add(spot);

const fill = new THREE.PointLight(0x1030a0, .5, 14);
fill.position.set(-5, 1, 3);
scene.add(fill);

const back = new THREE.DirectionalLight(0xffe080, .5);
back.position.set(-1, 5, -6);
scene.add(back);

// ── Table ────────────────────────────────────────────────
const table = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 30),
  new THREE.MeshStandardMaterial({ color: 0x110705, roughness: .98 })
);
table.rotation.x = -Math.PI/2;
table.position.y = -1.5;
table.receiveShadow = true;
scene.add(table);

// ── Materials ────────────────────────────────────────────
const ceram = new THREE.MeshStandardMaterial({ color: 0xede5d2, roughness: .16, metalness: .02 });
const cofMat = new THREE.MeshStandardMaterial({ color: 0x1c0a02, roughness: .55 });

// ── Cup group ────────────────────────────────────────────
const g = new THREE.Group();
scene.add(g);

// Cup lathe: traces outer wall → rim → inner wall → closes at bottom center
const pts = [
  [.00,-.90],[.38,-.90],[.44,-.87],[.56,-.81],
  [.50,-.26],[.57, .22],[.63, .70],[.67, .86],
  [.69, .90],[.65, .92],[.60, .92],[.56, .88],
  [.50, .70],[.46, .10],[.43,-.30],[.40,-.85],[.00,-.90]
].map(([r,y]) => new THREE.Vector2(r, y));

const cup = new THREE.Mesh(new THREE.LatheGeometry(pts, 64), ceram);
cup.castShadow = true;
g.add(cup);

// Coffee surface disc sitting inside the cup
const cofDisk = new THREE.Mesh(new THREE.CircleGeometry(.48, 48), cofMat);
cofDisk.rotation.x = -Math.PI/2;
cofDisk.position.y = .75;
g.add(cofDisk);

// Handle — tube along a Catmull-Rom curve
const hPts = [
  [.63, .38,0],[1.04,.35,0],[1.17,.09,0],[1.17,-.16,0],[1.04,-.38,0],[.63,-.40,0]
].map(([x,y,z]) => new THREE.Vector3(x,y,z));
const handle = new THREE.Mesh(
  new THREE.TubeGeometry(new THREE.CatmullRomCurve3(hPts), 24, .055, 10, false),
  ceram
);
handle.castShadow = true;
g.add(handle);

// Saucer lathe
const sPts = [
  [.00,-1.08],[.35,-1.10],[.55,-1.14],[.80,-1.11],[1.00,-1.04],
  [1.12,-.98],[1.14,-.94],[1.10,-.90],[.70,-.88],[.50,-.90],[.00,-.92]
].map(([r,y]) => new THREE.Vector2(r,y));
const saucer = new THREE.Mesh(new THREE.LatheGeometry(sPts, 64), ceram);
saucer.castShadow = true;
saucer.receiveShadow = true;
g.add(saucer);

// ── Steam particles ──────────────────────────────────────
const SC = 80;
const sPos = new Float32Array(SC*3);
const sMeta = Array.from({length:SC}, () => ({
  life: Math.random(),
  speed: .004+Math.random()*.006,
  ox: (Math.random()-.5)*.35,
  wob: .3+Math.random()*.7,
  phase: Math.random()*Math.PI*2
}));
const sGeo = new THREE.BufferGeometry();
sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
const sMat = new THREE.PointsMaterial({
  color:0xffffff, size:.05, transparent:true, opacity:.12, sizeAttenuation:true
});
scene.add(new THREE.Points(sGeo, sMat));

// ── Pour particles ───────────────────────────────────────
const PC = 400;
const pPos = new Float32Array(PC*3);
const pVel = Array.from({length:PC}, () => ({x:0,y:0,z:0}));
const pLife = new Float32Array(PC);
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const pMat = new THREE.PointsMaterial({
  color:0x281000, size:.07, transparent:true, opacity:0, sizeAttenuation:true
});
scene.add(new THREE.Points(pGeo, pMat));
for (let i=0;i<PC;i++) pPos[i*3+1]=-50;

// Spawn a pour particle at the world-space position of the low rim
function spawnP(i) {
  const o = new THREE.Vector3(.58,.89,0).applyMatrix4(g.matrixWorld);
  pPos[i*3]   = o.x+(Math.random()-.5)*.05;
  pPos[i*3+1] = o.y+(Math.random()-.5)*.04;
  pPos[i*3+2] = o.z+(Math.random()-.5)*.04;
  pVel[i] = {
    x:  .012+Math.random()*.013,
    y:  .005-Math.random()*.022,
    z: (Math.random()-.5)*.006
  };
  pLife[i] = 0;
}

// ── Interaction ──────────────────────────────────────────
let hover=false, tilt=0, pour=0, T=0;
const ray=new THREE.Raycaster(), mouse=new THREE.Vector2();

window.addEventListener('mousemove', e => {
  mouse.set((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
  ray.setFromCamera(mouse, cam);
  const was=hover;
  hover=ray.intersectObjects([cup,handle,saucer,cofDisk]).length>0;
  if (hover&&!was) document.getElementById('hint').classList.add('gone');
});

// ── Render loop ──────────────────────────────────────────
(function tick() {
  requestAnimationFrame(tick);
  T+=.01;

  g.position.y=Math.sin(T*.55)*.04;
  if (!hover&&pour<.05) g.rotation.y+=.003;

  tilt+=(( hover?-Math.PI*.38:0)-tilt)*.045;
  g.rotation.z=tilt;

  pour=Math.max(0,Math.min(1, pour+(hover?1:-3)*.022));

  // Must update world matrix after transforms, before particle world-space queries
  g.updateMatrixWorld(true);

  // Steam — fade out when pouring
  sMat.opacity=.12*Math.max(0, 1-pour*3);
  for (let i=0;i<SC;i++) {
    const s=sMeta[i];
    s.life+=s.speed;
    if (s.life>1) { s.life=0; s.ox=(Math.random()-.5)*.35; }
    const wp=new THREE.Vector3(s.ox,.90+s.life*1.4,0).applyMatrix4(g.matrixWorld);
    sPos[i*3]  =wp.x+Math.sin(T*2+s.phase)*.07*s.wob;
    sPos[i*3+1]=wp.y;
    sPos[i*3+2]=wp.z;
  }
  sGeo.attributes.position.needsUpdate=true;

  // Pour
  if (pour>.2) {
    pMat.opacity=Math.min(pour*.9,.82);
    const active=Math.floor(pour*PC*.55);
    for (let i=0;i<PC;i++) {
      if (i<active) {
        pLife[i]+=.022;
        if (pLife[i]>1||pPos[i*3+1]<-3) spawnP(i);
        else {
          pPos[i*3]  +=pVel[i].x;
          pPos[i*3+1]+=pVel[i].y;
          pVel[i].y  -=.0038;
          pPos[i*3+2]+=pVel[i].z;
        }
      } else pPos[i*3+1]=-50;
    }
  } else {
    pMat.opacity=0;
    for (let i=0;i<PC;i++) pPos[i*3+1]=-50;
  }
  pGeo.attributes.position.needsUpdate=true;

  spot.intensity=4.2+Math.sin(T*.65)*.4;
  renderer.render(scene, cam);
})();

window.addEventListener('resize', () => {
  cam.aspect=innerWidth/innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
